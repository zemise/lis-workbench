name: Build LIS Workbench

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LABELPRINT_VERSION: v1.2.7
  LABELPRINT_WIN7_ASSET: labelprint-v1.2.7-windows-x64-vs2022-win7.zip

jobs:
  windows-installer:
    name: Windows 7-11 installer
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path src/version.h -Pattern 'kVersion\s*=' | Select-Object -First 1
          if (-not $line) {
            throw "Cannot read version from src/version.h"
          }
          $value = [regex]::Match($line.Line, '"([^"]+)"').Groups[1].Value
          if (-not $value) {
            throw "Invalid version line: $($line.Line)"
          }
          "value=$value" >> $env:GITHUB_OUTPUT

      - name: Download LabelPrint release package
        id: labelprint
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP $env:LABELPRINT_WIN7_ASSET
          $extractRoot = Join-Path $env:RUNNER_TEMP "LabelPrint"
          $url = "https://github.com/zemise/LabelPrint/releases/download/$env:LABELPRINT_VERSION/$env:LABELPRINT_WIN7_ASSET"

          Invoke-WebRequest -Uri $url -OutFile $zipPath
          New-Item -ItemType Directory -Force $extractRoot | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

          $config = Get-ChildItem -Path $extractRoot -Recurse -Filter LabelPrintConfig.cmake |
            Select-Object -First 1
          if (-not $config) {
            throw "LabelPrintConfig.cmake not found in $zipPath"
          }

          $packageRoot = Split-Path (Split-Path $config.FullName -Parent) -Parent
          "package_root=$packageRoot" >> $env:GITHUB_OUTPUT
          Write-Host "LabelPrint package root: $packageRoot"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build LIS Workbench
        shell: pwsh
        run: |
          .\scripts\build_main.ps1 `
            -Clean `
            -Config Release `
            -Generator "Visual Studio 17 2022" `
            -LabelPrintPackagePath "${{ steps.labelprint.outputs.package_root }}"

      - name: Package installer
        shell: pwsh
        run: |
          $outDir = "out\windows\installer"
          New-Item -ItemType Directory -Force $outDir | Out-Null

          $makensis = Join-Path ${env:ProgramFiles(x86)} "NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $cmd = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if (-not $cmd) {
              throw "makensis.exe not found"
            }
            $makensis = $cmd.Source
          }

          $outputName = "LISWorkbench-Setup-${{ steps.version.outputs.value }}-win7-win11.exe"
          & $makensis `
            "/DAPP_VERSION=${{ steps.version.outputs.value }}" `
            "/DAPP_EXE=lis_workbench.exe" `
            "/DBUILD_DIR=..\build\main-app\Release" `
            "/DOUTPUT_DIR=..\out\windows\installer" `
            "/DOUTPUT_NAME=$outputName" `
            "packaging\LISWorkbench.nsi"

          if ($LASTEXITCODE -ne 0) {
            throw "NSIS packaging failed"
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LISWorkbench-Setup-${{ steps.version.outputs.value }}-win7-win11
          path: out/windows/installer/LISWorkbench-Setup-${{ steps.version.outputs.value }}-win7-win11.exe

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: LISWorkbench-Portable-${{ steps.version.outputs.value }}-win7-win11
          path: build/main-app/Release/lis_workbench.exe
